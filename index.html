<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Sairy Hub</title>

  <meta
    name="description"
    content="技術・趣味・学習の記録サイト"
  >

  <meta
    name="robots"
    content="index,follow"
  >

  <meta
    property="og:title"
    content="Sairy Hub"
  >

  <meta
    property="og:description"
    content="個人サイト"
  >

  <meta
    property="og:type"
    content="website"
  >

  <link
    rel="stylesheet"
    href="/css/style.css"
  >
</head>

<body>

  <!-- 共通ヘッダー -->
  <div data-include="/components/header.html"></div>

  <main class="cartoon-home">

    <section class="hero-card">

      <h1>Sairy Hub</h1>

      <p>
        Welcome to my strange little corner.<br>
        技術・趣味・学習ログ・思いつきなどを置いています。
      </p>

    </section>

    <section class="desktop-grid">

      <a
        href="/blog/te"
        class="toon-card"
      >
        <div class="toon-icon">
          🎞
        </div>

        <h2>
          Tech Reel
        </h2>

        <p>
          技術・資格・学習ログ
        </p>
      </a>

      <a
        href="/blog/hb"
        class="toon-card"
      >
        <div class="toon-icon">
          🎮
        </div>

        <h2>
          Hobby Film
        </h2>

        <p>
          ゲーム・趣味
        </p>
      </a>

      <a
        href="/blog/mk"
        class="toon-card"
      >
        <div class="toon-icon">
          🛠
        </div>

        <h2>
          Workshop
        </h2>

        <p>
          制作・サイト改善
        </p>
      </a>

      <a
        href="/blog/lf"
        class="toon-card"
      >
        <div class="toon-icon">
          📓
        </div>

        <h2>
          Diary Notes
        </h2>

        <p>
          日記・雑記
        </p>
      </a>

      <a
        href="/blog/archives"
        class="toon-card"
      >
        <div class="toon-icon">
          📚
        </div>

        <h2>
          Film Shelf
        </h2>

        <p>
          記事一覧
        </p>
      </a>

      <div class="toon-card latest-card">

        <div class="toon-icon">
          📽
        </div>

        <h2>
          Now Showing
        </h2>

        <div id="latest-post">
          <p>
            読み込み中...
          </p>
        </div>

      </div>

    </section>

  </main>

  <!-- 共通フッター -->
  <div data-include="/components/footer.html"></div>

  <script
    src="/js/include.js"
    defer
  ></script>

</body>

</html>
