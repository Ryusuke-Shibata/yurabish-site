<!DOCTYPE html>
<html lang="ja">

<head>

    <!-- ======================
         基本設定
    ======================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Sairy Hub</title>


    <!-- ======================
         SEO
    ======================= -->

    <meta
        name="description"
        content="Sairy Hub | 技術・趣味・制作・日常の記録サイト"
    >

    <meta
        name="robots"
        content="index, follow"
    >

    <link
        rel="canonical"
        href="https://yurabish.com"
    >


    <!-- ======================
         OGP
    ======================= -->

    <meta
        property="og:title"
        content="Sairy Hub"
    >

    <meta
        property="og:description"
        content="Records & Strange Logs"
    >

    <meta
        property="og:type"
        content="website"
    >

    <meta
        property="og:url"
        content="https://yurabish.com"
    >

    <meta
        property="og:image"
        content="https://yurabish.com/img/ogp.png"
    >


    <!-- ======================
         CSS
    ======================= -->

    <link
        rel="stylesheet"
        href="/css/style.css"
    >

</head>

<body>


    <!-- ======================
         共通ヘッダー
    ======================= -->

    <div data-include="/components/header.html"></div>



    <!-- ======================
         メインコンテンツ
    ======================= -->

    <main id="main-content">


        <!-- ======================
             ヒーロー
        ======================= -->

        <section class="hero-box">

            <h1>

                Sairy Hub

            </h1>

            <p>

                Welcome to my strange little corner

            </p>

            <p>

                技術・趣味・制作ログ・思いつきなどを置いています。

            </p>

        </section>



        <!-- ======================
             最新記事
        ======================= -->

        <section class="showcase">

            <div class="section-label">

                NOW SHOWING

            </div>


            <!-- JS置換対象 -->

            <div id="latest-post">

                <article class="featured-card">

                    <h2>

                        Loading...

                    </h2>

                    <p>

                        記事を読み込み中...

                    </p>

                </article>

            </div>

        </section>



        <!-- ======================
             カテゴリ
        ======================= -->

        <section class="category-grid">


            <a
                class="category-card"
                href="/blog/te"
            >

                <div class="icon">

                    📺

                </div>

                <h3>

                    Tech Reel

                </h3>

                <p>

                    技術・資格・学習ログ

                </p>

            </a>



            <a
                class="category-card"
                href="/blog/hb"
            >

                <div class="icon">

                    🎮

                </div>

                <h3>

                    Hobby Film

                </h3>

                <p>

                    ゲーム・趣味

                </p>

            </a>



            <a
                class="category-card"
                href="/blog/mk"
            >

                <div class="icon">

                    🔧

                </div>

                <h3>

                    Workshop

                </h3>

                <p>

                    制作・改善ログ

                </p>

            </a>



            <a
                class="category-card"
                href="/blog/lf"
            >

                <div class="icon">

                    📓

                </div>

                <h3>

                    Diary Notes

                </h3>

                <p>

                    日記・雑記

                </p>

            </a>


        </section>



        <!-- ======================
             アーカイブ導線
        ======================= -->

        <section class="random-box">

            <div class="section-label">

                FILM SHELF

            </div>

            <article class="featured-card">

                <h3>

                    Archive

                </h3>

                <p>

                    全記事一覧はこちら

                </p>

                <a href="/blog/archives">

                    Open →

                </a>

            </article>

        </section>


    </main>



    <!-- ======================
         共通フッター
    ======================= -->

    <div data-include="/components/footer.html"></div>



    <!-- ======================
         JavaScript
    ======================= -->

    <script
        src="/js/include.js"
        defer
    ></script>

    <script
        src="/js/latest.js"
        defer
    ></script>



    <!-- ======================
         JS無効時
    ======================= -->

    <noscript>

        <div
            style="
                background:#ffcccc;
                padding:1rem;
                text-align:center;
            "
        >

            JavaScriptが無効になっています。

        </div>

    </noscript>


</body>

</html>
