<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>

        Sairy Hub

    </title>

    <link
        rel="stylesheet"
        href="/css/style.css"
    >

</head>

<body>

    <!-- 共通ヘッダー -->

    <div data-include="/components/header.html"></div>


    <!-- =====================
         Main
    ====================== -->

    <main id="main-content">


        <!-- サイト説明 -->

        <section class="storage-intro">

            <h1>

                Sairy Hub

            </h1>

            <p>

                物置の隅に置かれた
                技術・趣味・制作記録。

            </p>

            <p>

                必要なものも、
                そうでもないものも、
                いろいろ置いてあります。

            </p>

        </section>


        <!-- 部屋マップ -->

        <section class="storage-map">


            <a
                href="/blog/te"
                class="storage-box tech"
            >

                <div>

                    📺

                </div>

                <h2>

                    Tech Reel

                </h2>

                <small>

                    技術・資格・学習ログ

                </small>

            </a>


            <a
                href="/blog/hb"
                class="storage-box hobby"
            >

                <div>

                    🎮

                </div>

                <h2>

                    Hobby Film

                </h2>

                <small>

                    ゲーム・趣味

                </small>

            </a>


            <a
                href="/blog/mk"
                class="storage-box make"
            >

                <div>

                    🔧

                </div>

                <h2>

                    Workshop

                </h2>

                <small>

                    制作・改善ログ

                </small>

            </a>


            <a
                href="/blog/lf"
                class="storage-box life"
            >

                <div>

                    📓

                </div>

                <h2>

                    Diary Notes

                </h2>

                <small>

                    日記・雑記

                </small>

            </a>


            <a
                href="/blog/archives"
                class="storage-box archive"
            >

                <div>

                    📦

                </div>

                <h2>

                    Film Shelf

                </h2>

                <small>

                    全記事一覧

                </small>

            </a>


        </section>



        <!-- 最新記事 -->

        <section class="today-found">

            <div class="found-label">

                TODAY FOUND

            </div>


            <div id="latest-post">

                <p>

                    読み込み中...

                </p>

            </div>

        </section>


    </main>



    <!-- 共通フッター -->

    <div data-include="/components/footer.html"></div>



    <script
        src="/js/include.js"
        defer
    ></script>

    <script
        src="/js/latest.js"
        defer
    ></script>


</body>

</html>
