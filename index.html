<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>

        Sairy Hub

    </title>

    <link
        rel="stylesheet"
        href="/css/style.css"
    >

</head>

<body>

    <!-- 共通ヘッダー -->

    <div data-include="/components/header.html"></div>


    <main>


        <!-- サイト説明 -->

        <section class="hero">

            <h1>

                SAIRY HUB

            </h1>

            <p>

                Records & Strange Logs

            </p>

        </section>



        <!-- カテゴリ -->

        <section class="menu-grid">


            <a
                href="/blog/te"
                class="menu-card knowledge"
            >

                <span class="stamp">

                    NEW★

                </span>

                <div class="memo">

                    → useful

                </div>

                <h2>

                    Knowledge

                </h2>

                <p>

                    技術・資格・学習ログ

                </p>

            </a>



            <a
                href="/blog/hb"
                class="menu-card inventory"
            >

                <span class="stamp">

                    HOT♥

                </span>

                <div class="memo">

                    play now

                </div>

                <h2>

                    Inventory

                </h2>

                <p>

                    趣味・ゲーム・好きなもの

                </p>

            </a>



            <a
                href="/blog/mk"
                class="menu-card crafting"
            >

                <span class="stamp">

                    UPDATE⚙

                </span>

                <div class="memo">

                    WIP...

                </div>

                <h2>

                    Crafting

                </h2>

                <p>

                    制作ログ

                </p>

            </a>



            <a
                href="/blog/lf"
                class="menu-card journal"
            >

                <span class="stamp">

                    LOG✎

                </span>

                <div class="memo">

                    random

                </div>

                <h2>

                    Journal

                </h2>

                <p>

                    日記・雑記

                </p>

            </a>


        </section>



        <!-- 最新記事 -->

        <section class="quest-box">

            <div class="quest-title">

                RECENT DISCOVERY

            </div>

            <div id="latest-post">

                読み込み中...

            </div>

        </section>


    </main>


    <div data-include="/components/footer.html"></div>


    <script
        src="/js/include.js"
        defer
    ></script>

    <script
        src="/js/latest.js"
        defer
    ></script>

</body>

</html>
