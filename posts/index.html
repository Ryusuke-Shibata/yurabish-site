<!DOCTYPE html>
<html lang="ja">

<head>

    <!-- ======================
         基本設定
    ======================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title id="page-title">

        Loading...

    </title>


    <!-- ======================
         SEO
    ======================= -->

    <meta
        name="description"
        content="Sairy Hubの記事ページ"
    >

    <meta
        name="robots"
        content="index,follow"
    >


    <!-- ======================
         CSS
    ======================= -->

    <link
        rel="stylesheet"
        href="/css/style.css"
    >

</head>

<body>

    <!-- ======================
         共通ヘッダー
    ======================= -->

    <div
        data-include="/components/header.html"
    ></div>


    <!-- ======================
         記事本体
    ======================= -->

    <main class="post-container">

        <article class="post">

            <!-- 記事ヘッダー -->

            <header class="post-header">

                <span class="post-stamp">

                    RECORD
                </span>

                <h1
                    id="post-title"
                    class="post-title"
                >

                    Loading...

                </h1>

                <div class="post-meta">

                    <time
                        id="post-date"
                    ></time>

                    <span
                        id="post-category"
                    ></span>

                </div>

            </header>


            <!-- Markdown本文 -->

            <section
                id="content"
                class="post-contents"
            >

                <p>

                    Loading...

                </p>

            </section>

        </article>

    </main>


    <!-- ======================
         共通フッター
    ======================= -->

    <div
        data-include="/components/footer.html"
    ></div>


    <!-- ======================
         Script
    ======================= -->

    <script
        src="/js/include.js"
        defer
    ></script>

    <script
        src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    ></script>

    <script
        src="/js/markdown.js"
        defer
    ></script>


    <!-- ======================
         JavaScript無効時
    ======================= -->

    <noscript>

        <div class="error-box">

            JavaScriptが無効です

        </div>

    </noscript>

</body>

</html>
