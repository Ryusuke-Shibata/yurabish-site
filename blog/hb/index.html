<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Sairy Hub - Hobby
  </title>

  <link
    rel="stylesheet"
    href="/css/style.css"
  >

</head>

<body>

  <!-- 共通ヘッダー -->
  <div
    data-include="/components/header.html"
  ></div>

  <!-- 本文 -->
  <main class="category-page">

    <!-- 説明 -->
    <section class="category-header">

      <h1>
        Hobby
      </h1>

      <p>
        プレイしたゲームや趣味についての記事を投稿していきます。
      </p>

    </section>

    <!-- 記事一覧 -->
    <section class="category-articles">

      <h2>
        Articles
      </h2>

      <div
        id="posts"
      >

        <p>
          読み込み中...
        </p>

      </div>

    </section>

  </main>

  <!-- 共通フッター -->
  <div
    data-include="/components/footer.html"
  ></div>

  <!-- JavaScript -->
  <script
    src="/js/include.js"
    defer
  ></script>

  <script
    src="/js/category.js"
    defer
  ></script>

  <script defer>

    document.addEventListener(
      "DOMContentLoaded",

      () => {

        renderCategory(
          "hb"
        );

      }
    );

  </script>

  <!-- JS無効時 -->
  <noscript>

    <div
      style="
        background:#ffcccc;
        color:#000;
        padding:1em;
        text-align:center;
      "
    >
      JavaScriptが無効になっています。
    </div>

  </noscript>

</body>

</html>
