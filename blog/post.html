<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title id="page-title">

        Loading...

    </title>

    <link
        rel="stylesheet"
        href="/css/style.css"
    >

</head>

<body>


    <!-- 共通ヘッダー -->

    <div data-include="/components/header.html"></div>


    <!-- ======================
         記事
    ======================= -->

    <main>


        <article class="post-window">


            <!-- 記事情報 -->

            <header class="post-header">


                <div class="post-label">

                    ARTICLE

                </div>


                <h1
                    id="post-title"
                ></h1>


                <div class="post-meta">

                    <time
                        id="post-date"
                    ></time>

                    <span
                        id="post-category"
                    ></span>

                </div>


            </header>



            <!-- Markdown本文 -->

            <div
                class="post-contents"
                id="content"
            >

            </div>


        </article>


    </main>


    <!-- 共通フッター -->

    <div data-include="/components/footer.html"></div>


    <!-- JS -->

    <script
        src="/js/include.js"
        defer
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script
        src="/js/markdown.js"
        defer
    ></script>


</body>

</html>
