<!DOCTYPE html>

<html lang="ja">

<head>

  <!-- ======================================
       基本設定
  ======================================= -->

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <!-- ======================================
       記事タイトル
       
       JSで上書きされる
  ======================================= -->

  <title
    id="page-title"
  >

    Loading...

  </title>



  <!-- ======================================
       共通CSS
  ======================================= -->

  <link
    rel="stylesheet"
    href="/css/style.css"
  >

</head>

<body>


  <!-- ======================================
       共通ヘッダー

       include.jsで読み込む
  ======================================= -->

  <div
    data-include=
    "/components/header.html"
  >
  </div>



  <!-- ======================================
       記事全体
  ======================================= -->

  <main
    class="post-page"
  >



    <!-- ==================================
         記事本体
    =================================== -->

    <article
      class="post"
    >



      <!-- ==============================
           記事ヘッダー
      =============================== -->

      <header
        class="post-header"
      >



        <!-- ==========================
             飾りラベル
        =========================== -->

        <div
          class="post-stamp"
        >

          Exploration Log

        </div>



        <!-- ==========================
             記事タイトル
        =========================== -->

        <h1
          class="post-title"
          id="post-title"
        >
        </h1>



        <!-- ==========================
             日付＋カテゴリ
        =========================== -->

        <div
          class="post-meta"
        >

          <time
            id="post-date"
          >
          </time>

          <span
            class="category"
            id="post-category"
          >
          </span>

        </div>

      </header>



      <!-- ==============================
           Markdown本文表示領域

           markdown.jsが
           本文をここへ挿入する
      =============================== -->

      <div
        class="post-contents"
        id="content"
      >

        <p>

          読み込み中...

        </p>

      </div>

    </article>

  </main>



  <!-- ======================================
       共通フッター
  ======================================= -->

  <div
    data-include=
    "/components/footer.html"
  >
  </div>



  <!-- ======================================
       JavaScript
  ======================================= -->

  <!-- 共通パーツ -->

  <script
    src="/js/include.js"
    defer
  ></script>


  <!-- Markdown変換ライブラリ -->

  <script
    src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    defer
  ></script>


  <!-- Markdown表示処理 -->

  <script
    src="/js/markdown.js"
    defer
  ></script>



  <!-- ======================================
       JS無効時
  ======================================= -->

  <noscript>

    <div
      style="
        background:#ffcccc;
        padding:1rem;
        text-align:center;
      "
    >

      JavaScriptが無効です

    </div>

  </noscript>

</body>

</html>
