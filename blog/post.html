<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title id="page-title">
    Loading...
  </title>

  <link
    rel="stylesheet"
    href="/css/style.css"
  >

</head>

<body>

  <!-- 共通ヘッダー -->
  <div
    data-include="/components/header.html"
  ></div>

  <!-- 記事本体 -->
  <main class="post-layout">

    <article class="post">

      <!-- 記事ヘッダー -->
      <header class="post-header">

        <h1
          class="post-title"
          id="post-title"
        ></h1>

        <div class="post-meta">

          <time
            id="post-date"
          ></time>

          <span
            class="category"
            id="post-category"
          ></span>

        </div>

      </header>

      <!-- Markdown本文 -->
      <div
        class="post-content"
        id="content"
      ></div>

    </article>

  </main>

  <!-- 共通フッター -->
  <div
    data-include="/components/footer.html"
  ></div>

  <noscript>

    <div
      style="
        background:#ffcccc;
        padding:1em;
        text-align:center;
      "
    >
      JavaScriptが無効になっています。
    </div>

  </noscript>

  <script
    src="/js/include.js"
    defer
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    defer
  ></script>

  <script
    src="/js/markdown.js"
    defer
  ></script>

</body>

</html>
