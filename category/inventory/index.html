<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Sairy Hub - Hobby
  </title>

  <link
    rel="stylesheet"
    href="/css/style.css"
  >

</head>

<body>

  <!-- 共通ヘッダー -->
  <div
    data-include="/components/header.html"
  ></div>

  <main
    class="category-page"
    data-category="hb"
    data-title="Hobby"
    data-description="ゲームとか好きなもの置き場"
  >

    <section class="category-hero">

      <div class="hero-card">

        <span class="hero-icon">
          🎮
        </span>

        <h1 id="category-title">
        </h1>

        <p id="category-description">
        </p>

      </div>

    </section>

    <section
      class="article-list"
    >

      <div
        id="posts"
      >
        <p>
          Loading...
        </p>
      </div>

    </section>

  </main>

  <!-- 共通フッター -->
  <div
    data-include="/components/footer.html"
  ></div>

  <!-- JS -->
  <script
    src="/js/include.js"
    defer
  ></script>

  <script
    src="/js/category.js"
    defer
  ></script>

  <script
    src="/js/category-page.js"
    defer
  ></script>

  <noscript>

    <div
      style="
        background:#ffcccc;
        padding:1em;
        text-align:center;
      "
    >
      JavaScriptが無効です
    </div>

  </noscript>

</body>

</html>
