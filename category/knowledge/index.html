<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Sairy Hub - Tech
  </title>

  <link
    rel="stylesheet"
    href="/css/style.css"
  >

</head>

<body>

  <!-- 共通ヘッダー -->
  <div
    data-include="/components/header.html"
  ></div>

  <!-- カテゴリ情報 -->
  <main
    class="category-page"
    data-category="te"
    data-title="Tech"
    data-description="技術面の学びの整理を投稿します。"
  >

    <!-- カテゴリ説明 -->
    <section class="category-header">

      <h1 id="category-title">
      </h1>

      <p id="category-description">
      </p>

    </section>

    <!-- 記事一覧 -->
    <section class="category-articles">

      <h2>
        Articles
      </h2>

      <div id="posts">

        <p>
          読み込み中...
        </p>

      </div>

    </section>

  </main>

  <!-- 共通フッター -->
  <div
    data-include="/components/footer.html"
  ></div>

  <!-- JS -->
  <script
    src="/js/include.js"
    defer
  ></script>

  <script
    src="/js/category.js"
    defer
  ></script>

  <script
    src="/js/category-page.js"
    defer
  ></script>

  <noscript>

    <div
      style="
        background:#ffcccc;
        padding:1em;
        text-align:center;
      "
    >
      JavaScriptが無効です
    </div>

  </noscript>

</body>

</html>
